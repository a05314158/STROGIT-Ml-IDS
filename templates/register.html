{% extends "base.html" %}
{% block content %}
<div class="container-fluid d-flex align-items-center justify-content-center" style="min-height: 90vh;">
    <div class="ids-card p-5" style="width: 100%; max-width: 480px; animation: fadeInUp 0.6s ease-out;">
        <div class="text-center mb-5">
            <div class="mb-4" style="font-size: 3rem;">
                <i class="fa-solid fa-user-plus text-primary" style="text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);"></i>
            </div>
            <h2 class="fw-900 text-white mb-2">Create Account</h2>
            <p class="ids-tiny text-dim"><i class="fa-solid fa-rocket me-1"></i>Join the Neural Defense Network</p>
        </div>

        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show mb-4" role="alert">
            <i class="fa-solid fa-exclamation-circle me-2"></i>{{ error }}
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert"></button>
        </div>
        {% endif %}

        <form method="POST" action="{{ url_for('register') }}">
            <div class="mb-4">
                <label class="ids-tiny text-primary mb-2 d-block">Username</label>
                <input type="text" name="username" class="form-control bg-black border-secondary border-opacity-25 text-white py-3 rounded-3" placeholder="your_username" required autofocus style="transition: 0.3s;">
            </div>

            <div class="mb-4">
                <label class="ids-tiny text-primary mb-2 d-block">Email Address</label>
                <input type="email" name="email" class="form-control bg-black border-secondary border-opacity-25 text-white py-3 rounded-3" placeholder="your@email.com" required style="transition: 0.3s;">
            </div>

            <div class="mb-5">
                <label class="ids-tiny text-primary mb-2 d-block">Password</label>
                <input type="password" name="password" class="form-control bg-black border-secondary border-opacity-25 text-white py-3 rounded-3" placeholder="••••••••" required style="transition: 0.3s;">
                <small class="text-dim mt-2 d-block">
                    <i class="fa-solid fa-info-circle me-1"></i>Minimum 8 characters recommended
                </small>
            </div>

            <button type="submit" class="btn-ids-primary w-100 py-3 fw-bold mb-4">
                <i class="fa-solid fa-check me-2"></i>Create Account
            </button>

            <div class="text-center border-top border-white border-opacity-10 pt-4">
                <p class="text-dim ids-tiny mb-3">Already have an account?</p>
                <a href="{{ url_for('login') }}" class="btn btn-outline-secondary w-100 py-2 rounded-3">
                    <i class="fa-solid fa-sign-in-alt me-2"></i>Sign In
                </a>
            </div>
        </form>

        <!-- Features -->
        <div class="row g-2 mt-5 pt-4 border-top border-white border-opacity-10">
            <div class="col-6">
                <small class="text-dim d-block mb-2"><i class="fa-solid fa-check text-success me-1"></i>Real-time Detection</small>
            </div>
            <div class="col-6">
                <small class="text-dim d-block mb-2"><i class="fa-solid fa-check text-success me-1"></i>AI-Powered</small>
            </div>
            <div class="col-6">
                <small class="text-dim d-block"><i class="fa-solid fa-check text-success me-1"></i>Enterprise Grade</small>
            </div>
            <div class="col-6">
                <small class="text-dim d-block"><i class="fa-solid fa-check text-success me-1"></i>24/7 Support</small>
            </div>
        </div>
    </div>
</div>

<style>
    input:focus {
        border-color: var(--accent-primary) !important;
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.2) !important;
    }
</style>
{% endblock %}
