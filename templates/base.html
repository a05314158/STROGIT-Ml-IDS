<!DOCTYPE html>
<html lang="ru" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ML-IDS Genesis | Cyber Intelligence</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #030508;
            --card-bg: rgba(13, 17, 23, 0.7);
            --accent-primary: #00d2ff;
            --accent-secondary: #3a7bd5;
            --accent-danger: #ff4757;
            --accent-success: #3fb950;
            --accent-warning: #ffa502;
            --border-color: rgba(255, 255, 255, 0.08);
            --text-main: #e6edf3;
            --text-dim: #8b949e;
            --glow: 0 0 20px rgba(0, 210, 255, 0.15);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image:
                radial-gradient(circle at 50% 0%, rgba(0, 210, 255, 0.08), transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(157, 80, 187, 0.05), transparent 40%),
                linear-gradient(rgba(255, 255, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.02) 1px, transparent 1px);
            background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            margin: 0;
            overflow-x: hidden;
        }

        /* Animated gradient background */
        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%, 100% 100%, 0 0, 0 0; }
            50% { background-position: 100% 50%, 0% 0%, 0 0, 0 0; }
        }

        body {
            animation: gradientShift 20s ease infinite;
        }

        .navbar {
            background: rgba(3, 5, 8, 0.95) !important;
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 0;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .navbar-brand {
            font-weight: 900;
            font-size: 1.3rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .navbar-brand:hover {
            text-shadow: var(--glow);
            transform: scale(1.05);
        }

        .nav-link {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim) !important;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 0.5rem 1.2rem !important;
            position: relative;
            overflow: hidden;
        }

        .nav-link::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--accent-primary), transparent);
            transition: left 0.3s;
        }

        .nav-link:hover::before, .nav-link.active::before {
            left: 100%;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--accent-primary) !important;
            text-shadow: var(--glow);
        }

        .ids-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .ids-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 210, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        .ids-card:hover {
            border-color: rgba(0, 210, 255, 0.3);
            box-shadow: 0 10px 40px rgba(0, 210, 255, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            transform: translateY(-4px);
        }

        .ids-card:hover::before {
            left: 100%;
        }

        .btn-ids-primary {
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            color: white;
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 800;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            position: relative;
            overflow: hidden;
            cursor: pointer;
        }

        .btn-ids-primary::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .btn-ids-primary:hover::before {
            width: 300px;
            height: 300px;
        }

        .btn-ids-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.15);
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.4);
        }

        .btn-ids-primary:active {
            transform: translateY(0);
        }

        .ids-tiny {
            font-size: 10px;
            font-weight: 800;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-dim);
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-30px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes pulse-glow {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 210, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 40px rgba(0, 210, 255, 0.4);
            }
        }

        main {
            animation: fadeInUp 0.6s ease-out;
        }

        .ids-card {
            animation: fadeInUp 0.6s ease-out;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, var(--accent-primary), var(--accent-secondary));
            border-radius: 10px;
            transition: 0.3s;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, var(--accent-secondary), var(--accent-primary));
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.3);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .navbar-nav {
                flex-direction: column;
                gap: 0.5rem !important;
            }

            .nav-link {
                padding: 0.5rem 0 !important;
            }

            h1, h2 {
                font-size: 1.8rem !important;
            }
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container-fluid px-4">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('home') }}">
                <div class="p-2 bg-primary bg-opacity-10 rounded-3 border border-primary border-opacity-20">
                    <i class="fa-solid fa-shield-halved text-primary fs-5"></i>
                </div>
                <span class="fw-bolder fs-5 text-white">GENESIS <span class="badge bg-primary text-dark rounded-pill" style="font-size: 9px; vertical-align: middle;">AI-CORE</span></span>
            </a>

            <div class="navbar-nav mx-auto gap-2">
                <a class="nav-link {% if request.endpoint == 'dashboard' %}active{% endif %}" href="{{ url_for('dashboard') }}">Console</a>
                <a class="nav-link {% if request.endpoint == 'productivity' %}active{% endif %}" href="{{ url_for('productivity') }}">Traffic</a>
                <a class="nav-link {% if request.endpoint == 'statistics' %}active{% endif %}" href="{{ url_for('statistics') }}">Topology</a>
                {% if current_user.is_authenticated %}
                <a class="nav-link {% if request.endpoint == 'api_keys' %}active{% endif %}" href="{{ url_for('api_keys') }}">API Keys</a>
                {% endif %}
            </div>

            <div class="d-flex align-items-center gap-3">
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('profile') }}" class="ids-card px-3 py-2 d-flex align-items-center gap-3 text-decoration-none hover-up">
                    <div style="width: 8px; height: 8px; border-radius: 50%; background: #3fb950; box-shadow: 0 0 10px #3fb950;"></div>
                    <span class="ids-tiny mb-0 text-white">{{ current_user.username }}</span>
                </a>
                <a href="{{ url_for('logout') }}" class="btn btn-link text-danger text-decoration-none fw-bold small">EXIT</a>
                {% endif %}
            </div>
        </div>
    </nav>
    <main>{% block content %}{% endblock %}</main>
</body>
</html>
